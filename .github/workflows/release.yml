name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync JSR versions and publish
        if: steps.changesets.outputs.published == 'true'
        run: |
          for dir in packages/*/; do
            [ ! -f "$dir/jsr.json" ] && continue
            version=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('${dir}package.json','utf8')).version)")
            bun -e "
              const fs = require('fs');
              const j = JSON.parse(fs.readFileSync('${dir}jsr.json', 'utf8'));
              j.version = '$version';
              fs.writeFileSync('${dir}jsr.json', JSON.stringify(j, null, 2) + '\n');
            "
            cd "$dir" && bunx jsr publish --allow-dirty || true && cd ../..
          done
