name: CI

# Example workflow showing how to integrate flaky-tests into your CI pipeline.
# Copy and adapt this for your own project.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HAS_FLAKY_SECRETS: ${{ secrets.FLAKY_TESTS_TURSO_URL != '' && secrets.FLAKY_TESTS_TURSO_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Run tests — the preload captures failures to your store automatically.
      # Env vars are empty strings when secrets are unset; the preload treats
      # that as "no store configured" and no-ops, so tests still run locally
      # and on forked PRs without telemetry.
      - name: Run tests
        env:
          FLAKY_TESTS_CONNECTION_STRING: ${{ secrets.FLAKY_TESTS_TURSO_URL }}
          FLAKY_TESTS_AUTH_TOKEN: ${{ secrets.FLAKY_TESTS_TURSO_TOKEN }}
        run: bun test

      # Warn once, on main only, when secrets are missing — skipping on PRs
      # from forks avoids noise since secrets are intentionally unavailable there.
      - name: Verify flaky-tests prerequisites
        if: github.ref == 'refs/heads/main' && env.HAS_FLAKY_SECRETS != 'true'
        run: |
          echo "::warning::FLAKY_TESTS_TURSO_URL or FLAKY_TESTS_TURSO_TOKEN is not set; pattern check will be skipped. Add both under Settings → Secrets and variables → Actions to enable."

      # Optional: check for new patterns immediately after the test run.
      # Runs on main only to avoid noisy PR comments, and only when secrets are set.
      - name: Check for new flaky patterns
        if: github.ref == 'refs/heads/main' && env.HAS_FLAKY_SECRETS == 'true'
        uses: brewpirate/flaky-tests@v1
        with:
          store: turso
          connection-string: ${{ secrets.FLAKY_TESTS_TURSO_URL }}
          auth-token: ${{ secrets.FLAKY_TESTS_TURSO_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          create-issues: 'true'
