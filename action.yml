name: 'flaky-tests'
description: 'Detect flaky tests and open GitHub issues automatically'
author: 'brewpirate'

branding:
  icon: 'activity'
  color: 'red'

inputs:
  store:
    description: 'Store backend to query. Options: turso, supabase, postgres'
    required: true

  connection-string:
    description: 'Database connection string (TURSO_URL, Supabase URL, or Postgres URL)'
    required: true

  auth-token:
    description: 'Auth token for the store (required for Turso and Supabase)'
    required: false
    default: ''

  github-token:
    description: 'GitHub token used to open issues. Defaults to the built-in GITHUB_TOKEN'
    required: false
    default: ${{ github.token }}

  window-days:
    description: 'Lookback window in days for flakiness detection'
    required: false
    default: '7'

  threshold:
    description: 'Minimum number of failures in the window to flag a test'
    required: false
    default: '2'

  create-issues:
    description: 'Whether to open GitHub issues for new flaky patterns'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install flaky-tests CLI
      shell: bash
      run: bun add -g @flaky-tests/cli

    - name: Run flaky-tests check
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        FLAKY_TESTS_WINDOW: ${{ inputs.window-days }}
        FLAKY_TESTS_THRESHOLD: ${{ inputs.threshold }}
        FLAKY_TESTS_STORE: ${{ inputs.store }}
        FLAKY_TESTS_CONNECTION_STRING: ${{ inputs.connection-string }}
        FLAKY_TESTS_AUTH_TOKEN: ${{ inputs.auth-token }}
      run: |
        ISSUE_FLAG=""
        if [ "${{ inputs.create-issues }}" = "true" ]; then
          ISSUE_FLAG="--create-issue"
        fi
        bunx @flaky-tests/cli --prompt $ISSUE_FLAG || true
